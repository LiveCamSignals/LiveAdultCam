<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔴 Live Chaturbate Adult Cams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; padding:20px; font-family:Arial, sans-serif; background:#0f0f0f; color:#eee; }
    h1 { text-align:center; color:#ff1493; }
    #controls { text-align:center; margin:20px 0; }
    button { padding:12px 28px; font-size:1.1em; background:#ff1493; color:white; border:none; border-radius:8px; cursor:pointer; }
    button:hover { background:#ff69b4; }
    #status { text-align:center; padding:20px; font-size:1.1em; }
    #rooms { display:grid; grid-template-columns:repeat(auto-fit, minmax(500px, 1fr)); gap:25px; }
    .room { background:#1a1a1a; border:1px solid #444; border-radius:12px; padding:16px; }
    .room h2 { margin:0 0 10px; font-size:1.6em; }
    .room h2 a { color:#ff69b4; text-decoration:none; }
    .room h2 a:hover { text-decoration:underline; }
    .info { color:#aaa; margin:8px 0; }
    iframe { width:100%; height:530px; border:none; border-radius:8px; background:#000; }
    .no-embed { color:#ffaa66; padding:30px; text-align:center; background:#222; border-radius:8px; }
  </style>
</head>
<body>
  <h1>🔴 Live Chaturbate Rooms</h1>
  <div id="controls">
    <button onclick="loadRooms()">🔄 Refresh Rooms</button>
  </div>
  <div id="status">Loading live rooms from Chaturbate...</div>
  <div id="rooms"></div>

  <script>
    async function getIP() {
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const d = await r.json();
        return d.ip;
      } catch(e) { return '8.8.8.8'; }
    }

    async function loadRooms() {
      const status = document.getElementById('status');
      const container = document.getElementById('rooms');
      status.textContent = 'Fetching rooms...';
      container.innerHTML = '';

      try {
        const ip = await getIP();
        const url = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=${encodeURIComponent(ip)}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          throw new Error('No rooms found');
        }

        const html = data.results.slice(0, 12).map(r => `
          <div class="room">
            <h2><a href="${r.chat_room_url_revshare || 'https://chaturbate.com/' + r.username}" target="_blank" rel="noopener">${r.username}</a></h2>
            <div class="info">👥 ${r.num_users} viewers • ${r.current_show} ${r.is_hd ? '• HD' : ''}</div>
            <p style="margin:8px 0;">${(r.room_subject || 'No description').substring(0, 180)}${(r.room_subject || '').length > 180 ? '...' : ''}</p>
            ${r.iframe_embed_revshare ? r.iframe_embed_revshare : '<div class="no-embed">Embed not available at the moment</div>'}
          </div>
        `).join('');

        container.innerHTML = html;
        status.style.display = 'none';
      } catch (e) {
        console.error(e);
        status.innerHTML = `❌ ${e.message}<br><br><button onclick="loadRooms()">Try Again</button>`;
      }
    }

    // Initial load + auto refresh
    loadRooms();
    setInterval(loadRooms, 240000);
  </script>
</body>
</html>
