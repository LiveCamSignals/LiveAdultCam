<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaturbate Live Adult Cams</title>
  <meta name="description" content="Live Chaturbate rooms with embeds">
  <style>
    body { margin:0; padding:20px; font-family:Arial,sans-serif; background:#0f0f0f; color:#eee; }
    h1 { text-align:center; color:#ff1493; }
    #controls { text-align:center; margin:20px 0; }
    button { padding:12px 24px; font-size:1.1em; background:#ff1493; color:white; border:none; border-radius:8px; cursor:pointer; }
    button:hover { background:#ff69b4; }
    #status { text-align:center; padding:20px; font-size:1.1em; }
    #rooms { display:grid; grid-template-columns:repeat(auto-fit, minmax(480px, 1fr)); gap:20px; }
    .room { background:#1a1a1a; border:1px solid #333; border-radius:10px; padding:15px; }
    .room h2 { margin:0 0 8px; font-size:1.5em; }
    .room h2 a { color:#ff69b4; text-decoration:none; }
    .room h2 a:hover { text-decoration:underline; }
    iframe { width:100%; height:520px; border:none; border-radius:8px; background:#000; }
    .info { font-size:0.95em; margin:8px 0; }
  </style>
</head>
<body>
  <h1>🔴 Live Chaturbate Rooms</h1>
  <div id="controls">
    <button onclick="loadRooms()">🔄 Refresh Now</button>
  </div>
  <div id="status">Loading live rooms...</div>
  <div id="rooms"></div>

  <script>
    async function getIP() {
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const d = await r.json();
        return d.ip;
      } catch(e) { return '8.8.8.8'; }
    }

    async function loadRooms() {
      const status = document.getElementById('status');
      const container = document.getElementById('rooms');
      status.textContent = 'Fetching rooms from Chaturbate...';
      container.innerHTML = '';

      try {
        const ip = await getIP();
        const url = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=${encodeURIComponent(ip)}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error('API error ' + res.status);

        const data = await res.json();

        if (!data.results?.length) throw new Error('No rooms available');

        const html = data.results.slice(0, 12).map(r => `
          <div class="room">
            <h2><a href="https://chaturbate.com/in/?tour=Limj&campaign=T2CSW&b=${encodeURIComponent(r.username)}" target="_blank">${r.username}</a></h2>
            <div class="info">👥 ${r.num_users} viewers • ${r.current_show} • ${r.is_hd ? 'HD' : ''}</div>
            <p>${(r.room_subject || 'No description').substring(0, 160)}${(r.room_subject || '').length > 160 ? '...' : ''}</p>
            ${r.iframe_embed_revshare || '<p style="color:#ffaa66">Embed not available right now</p>'}
          </div>
        `).join('');

        container.innerHTML = html;
        status.style.display = 'none';
      } catch (e) {
        console.error(e);
        status.innerHTML = `❌ ${e.message}<br><br><button onclick="loadRooms()">Try Again</button>`;
      }
    }

    // Load on start + every 4 minutes
    loadRooms();
    setInterval(loadRooms, 240000);
  </script>
</body>
</html>
