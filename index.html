    async function getIP() {
      try {
        const ipRes = await fetch("https://api.ipify.org?format=json", {cache: "no-store"});

        return ipData.ip;
      } catch (e) {

    async function loadRooms() {
      const status = document.getElementById("status");
      const container = document.getElementById("rooms");
      status.textContent = "Loading live rooms...";
      status.className = "loading";
      container.innerHTML = "";

      try {
        const ip = await getIP();
        const apiUrl = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=${encodeURIComponent(ip)}`;

        const data = await res.json();
        
        if (!data.results || data.results.length === 0) {
          throw new Error("No rooms available");
        }

        container.innerHTML = data.results.slice(0, 12).map(r => `
          <div class="room">
            <h2><a href="https://chaturbate.com/in/?tour=Limj&campaign=T2CSW&track=default&b=${encodeURIComponent(r.username)}" target="_blank" rel="noopener">${r.username}</a></h2>

            ${r.iframe_embed_revshare || '<p style="color:#ffaa66;">Embed unavailable</p>'}
          </div>
        `).join("");

        status.style.display = "none";
      } catch (e) {
        console.error(e);
        status.innerHTML = `<span class="error">Failed to load rooms: ${e.message}.<br>Try refreshing or hosting on a server that supports CORS better.</span>`;
      }
    }

    // Initial load + auto-refresh every 5 min
    loadRooms();
    setInterval(loadRooms, 300000);
  </script>
